<h2>“反复朗读”的节奏是怎样的？</h2>
<p class="subtitle">你希望练习流程如何组织？</p>

<div class="options">
  <div class="option" data-choice="full" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>全文模式</h3>
      <p>先完整读一遍全文，拿到反馈后，再完整读一遍，看总体进步</p>
    </div>
  </div>
  <div class="option" data-choice="sentence" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>句子循环</h3>
      <p>一句一句练，每句读到满意（比如分数达标）再进入下一句</p>
    </div>
  </div>
  <div class="option" data-choice="word" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>单词循环</h3>
      <p>重点练习被标红/标黄的单词，反复读这些词直到通过</p>
    </div>
  </div>
  <div class="option" data-choice="mixed" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>混合模式</h3>
      <p>先全文读一遍看问题，再针对问题句/问题词反复练</p>
    </div>
  </div>
</div>
