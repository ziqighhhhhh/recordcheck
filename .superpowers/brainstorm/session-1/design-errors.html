<h2>设计 A：错误处理</h2>
<p class="subtitle">常见问题与对应提示</p>

<div class="section">
  <div class="mockup">
    <div class="mockup-header">错误处理矩阵</div>
    <div class="mockup-body">
      <table style="width:100%;border-collapse:collapse;font-size:0.9rem">
        <tr style="background:#f1f5f9">
          <th style="text-align:left;padding:0.5rem;border:1px solid #cbd5e1">场景</th>
          <th style="text-align:left;padding:0.5rem;border:1px solid #cbd5e1">用户看到什么</th>
        </tr>
        <tr>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">麦克风权限被拒绝</td>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">请允许浏览器使用麦克风，或检查地址栏权限设置</td>
        </tr>
        <tr>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">Azure Key/Region 错误</td>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">Key 或 Region 无效，请检查 Azure 门户</td>
        </tr>
        <tr>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">网络断开或超时</td>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">连接 Azure 失败，请检查网络后重试</td>
        </tr>
        <tr>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">没有检测到语音</td>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">未听到声音，请靠近麦克风再试一次</td>
        </tr>
        <tr>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">识别结果与原文差异过大</td>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">建议先听标准发音，再一句一句练</td>
        </tr>
        <tr>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">浏览器不支持</td>
          <td style="padding:0.5rem;border:1px solid #e2e8f0">请使用最新版 Chrome/Edge/Safari</td>
        </tr>
      </table>
    </div>
  </div>
</div>

<p class="subtitle">原则：每个错误都给出“下一步该怎么做”，不让用户卡住。</p>
