<h2>你想得到什么样的反馈？</h2>
<p class="subtitle">“我读得有问题”可以拆成不同维度，你希望工具主要关注哪些？</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="accuracy" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>识别错误</h3>
      <p>漏读、多读、读错单词</p>
    </div>
  </div>
  <div class="option" data-choice="pronunciation" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>发音评分</h3>
      <p>每个单词/句子读得准不准，给出分数</p>
    </div>
  </div>
  <div class="option" data-choice="fluency" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>流畅度</h3>
      <p>语速、停顿、重复、卡顿</p>
    </div>
  </div>
  <div class="option" data-choice="prosody" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>语调/重音</h3>
      <p>句子升降调、重音位置是否自然</p>
    </div>
  </div>
  <div class="option" data-choice="summary" onclick="toggleSelect(this)">
    <div class="letter">E</div>
    <div class="content">
      <h3>总体结论</h3>
      <p>只要一个总体评分和“需要重点练习的句子/单词清单”</p>
    </div>
  </div>
</div>
