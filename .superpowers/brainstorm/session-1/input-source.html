<h2>原文从哪里来？</h2>
<p class="subtitle">你平时会把英文原文以什么方式提供给工具？</p>

<div class="options">
  <div class="option" data-choice="paste" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>手动粘贴</h3>
      <p>每次复制一段英文，直接贴进网页里就开练</p>
    </div>
  </div>
  <div class="option" data-choice="file" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>上传文件</h3>
      <p>上传 .txt / .pdf / .epub，工具自动提取文本</p>
    </div>
  </div>
  <div class="option" data-choice="url" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>网页链接</h3>
      <p>输入一个 URL，工具抓取正文</p>
    </div>
  </div>
  <div class="option" data-choice="library" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>个人句库</h3>
      <p>先维护一个文本库（单词本/句库），练的时候从中选</p>
    </div>
  </div>
</div>
