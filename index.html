<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今日练习岛</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { --primary:#19c8b9; --primary-hover:#3dd4c6; --primary-active:#11a89b; --primary-bg:#e6f9f6; --text:#794f27; --text-body:#725d42; --text-secondary:#9f927d; --text-muted:#8a7b66; --text-disabled:#c4b89e; --bg:#f8f8f0; --bg-content:rgb(247,243,223); --bg-disabled:#f0ece2; --border:#c4b89e; --border-hover:#a89878; --border-strong:#9f927d; --success:#6fba2c; --warning:#f5c31c; --error:#e05a5a; --error-active:#c94444; --focus-yellow:#ffcc00; --shadow-btn:#bdaea0; --r-sm:12px; --r-base:18px; --r-lg:24px; --r-pill:50px; --ease:cubic-bezier(0.4,0,0.2,1); --d-fast:0.15s; --d-base:0.25s; --d-slow:0.35s; }
    * { box-sizing:border-box; }
    html, body { margin:0; padding:0; }
    body { min-height:100vh; background:radial-gradient(circle at 20% 15%,rgba(25,200,185,.14) 0 2px,transparent 2px) 0 0/34px 34px,radial-gradient(circle at 70% 80%,rgba(245,195,28,.14) 0 2px,transparent 2px) 8px 8px/38px 38px,linear-gradient(180deg,#fffdf4 0%,var(--bg) 48%,#eef8e7 100%); color:var(--text-body); font-family:Nunito,'Noto Sans SC',-apple-system,'PingFang SC',sans-serif; font-weight:500; letter-spacing:.01em; line-height:1.6; }
    .island-page { min-height:100vh; padding:28px 16px 0; position:relative; overflow-x:hidden; }
    .island-page::before,.island-page::after { content:""; position:fixed; width:220px; height:220px; border-radius:50%; pointer-events:none; z-index:0; }
    .island-page::before { left:-90px; top:70px; background:radial-gradient(circle,rgba(130,213,187,.28),transparent 70%); }
    .island-page::after { right:-90px; bottom:40px; background:radial-gradient(circle,rgba(247,205,103,.28),transparent 70%); }
    .island-shell { width:min(960px,100%); margin:0 auto; position:relative; z-index:1; }
    .island-header { display:flex; flex-direction:column; align-items:center; gap:14px; margin-bottom:22px; text-align:center; }
    .ribbon-title { display:inline-flex; align-items:center; justify-content:center; min-height:56px; padding:0 46px; position:relative; color:#fff; font-size:clamp(24px,6vw,36px); font-weight:900; letter-spacing:.04em; line-height:1; filter:drop-shadow(0 3px 5px rgba(61,52,40,.10)); }
    .ribbon-title::before { content:""; position:absolute; inset:0 12px; z-index:-1; border-radius:8px; background:#82d5bb; box-shadow:inset 0 -3px 0 rgba(0,0,0,.06); transform:perspective(320px) rotateX(3deg); }
    .ribbon-title::after { content:""; position:absolute; inset:8px 0 -8px; z-index:-2; background:linear-gradient(90deg,#40a880 0 18px,transparent 18px calc(100% - 18px),#40a880 calc(100% - 18px)); clip-path:polygon(0 0,18px 50%,0 100%,100% 100%,calc(100% - 18px) 50%,100% 0); }
    .island-subtitle { max-width:620px; margin:0; color:var(--text-muted); font-size:15px; font-weight:600; }
    .quest-board { position:relative; padding:24px; border:2px solid #82d5bb; border-radius:var(--r-lg); background:radial-gradient(circle,rgba(130,213,187,.18) 1.5px,transparent 1.5px) 0 0/28px 28px,radial-gradient(circle,rgba(190,239,226,.18) 1px,transparent 1px) 7px 7px/14px 14px,#e3f5ee; color:var(--text-body); }
    .section { margin-bottom:0; animation:card-in var(--d-slow) var(--ease); }
    @keyframes card-in { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
    .section-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px; }
    .section-kicker { margin:0 0 4px; color:var(--primary-active); font-size:12px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; }
    .section-title { margin:0; color:var(--text); font-size:clamp(22px,5vw,30px); font-weight:900; letter-spacing:.02em; line-height:1.2; }
    .task-pill { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:29px; padding:0 12px; border:1.5px solid #f7cd67; border-radius:999px; background:rgba(247,205,103,.18); color:var(--text); font-size:13px; font-weight:700; white-space:normal; text-align:center; }
    .task-pill.status-listening { border-color:var(--primary); background:var(--primary-bg); color:var(--primary-active); animation:pulse-status 1s var(--ease) infinite; }
    .task-pill.status-scoring { border-color:var(--warning); background:#fff3c8; }
    .task-pill.status-pass { border-color:var(--success); background:#e9f6d4; color:#5a9e1e; }
    .task-pill.status-retry,.task-pill.status-error { border-color:var(--error); background:#fbe0e0; color:var(--error-active); }
    @keyframes pulse-status { 50% { transform:scale(1.03); } }
    .form-grid { display:grid; gap:16px; }
    @media (min-width:760px) { .form-grid.credentials { grid-template-columns:minmax(0,.8fr) minmax(0,1.2fr); } }
    label { display:block; margin:0 0 7px; color:var(--text); font-size:14px; font-weight:800; letter-spacing:.02em; }
    input, textarea { width:100%; border:2px solid var(--border); border-radius:var(--r-pill); background:var(--bg-content); color:var(--text-body); font:inherit; font-size:15px; font-weight:600; letter-spacing:.01em; outline:none; transition:border-color var(--d-fast) var(--ease),box-shadow var(--d-fast) var(--ease),background var(--d-fast) var(--ease); }
    input { min-height:44px; padding:0 18px; }
    textarea { min-height:154px; padding:16px 18px; border-radius:var(--r-lg); resize:vertical; line-height:1.7; }
    input::placeholder,textarea::placeholder { color:var(--text-disabled); font-weight:400; }
    input:hover,textarea:hover { border-color:var(--border-hover); background:#fffdf7; }
    input:focus,textarea:focus { border-color:var(--focus-yellow); box-shadow:0 0 0 3px rgba(255,204,0,.15); }
    .action-row { display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:center; margin-top:18px; }
    button { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:45px; width:auto; min-width:150px; padding:0 20px; border:2px solid var(--border-strong); border-radius:var(--r-pill); background:var(--bg); color:var(--text); cursor:pointer; font:inherit; font-size:14px; font-weight:700; letter-spacing:.02em; line-height:1; touch-action:manipulation; transition:transform var(--d-fast) var(--ease),box-shadow var(--d-fast) var(--ease),border-color var(--d-fast) var(--ease),color var(--d-fast) var(--ease),background var(--d-fast) var(--ease); box-shadow:0 2px 4px 0 rgba(61,52,40,.06); }
    button:hover { border-color:var(--primary); color:var(--primary-active); transform:translateY(-1px); box-shadow:0 3px 10px 0 rgba(61,52,40,.10); }
    button:active { transform:translateY(0); box-shadow:0 2px 4px 0 rgba(61,52,40,.06); }
    button:focus-visible { outline:2px solid var(--primary); outline-offset:2px; }
    button:disabled { opacity:.58; cursor:not-allowed; transform:none!important; box-shadow:none!important; }
    #startBtn,#drillRecordBtn { min-height:48px; padding:0 32px; border-color:var(--bg); background:var(--bg); box-shadow:0 5px 0 0 var(--shadow-btn); font-size:16px; }
    #drillRecordBtn.is-recording { border-color:var(--error-active); background:var(--error); color:#fff; box-shadow:0 5px 0 0 var(--error-active); }
    #drillRecordBtn.is-scoring { border-color:var(--warning); background:#fff3c8; color:var(--text); box-shadow:none; }
    #startBtn:hover,#drillRecordBtn:hover { box-shadow:0 6px 0 0 var(--shadow-btn); transform:translateY(-1px); }
    #startBtn:active,#drillRecordBtn:active { box-shadow:0 1px 0 0 var(--shadow-btn); transform:translateY(2px); }
    #stopBtn { border-color:var(--error-active); background:var(--error); color:#fff; box-shadow:0 5px 0 0 var(--error-active); }
    #stopBtn:hover { color:#fff; box-shadow:0 6px 0 0 var(--error-active); transform:translateY(-1px); }
    #stopBtn:active { box-shadow:0 1px 0 0 var(--error-active); transform:translateY(2px); }
    .task-card { width:100%; border:2px dashed #e8dcc8; border-radius:var(--r-lg); background:rgba(255,253,247,.78); padding:18px; }
    #recText,#drillTarget { margin:0; color:var(--text-body); font-size:clamp(18px,4vw,24px); font-weight:800; line-height:1.75; text-align:left; word-break:break-word; white-space:pre-wrap; }
    .timer-card { display:inline-flex; align-items:center; justify-content:center; gap:14px; min-height:58px; padding:10px 26px; border:3px solid #d4cfc3; border-radius:var(--r-base); background:linear-gradient(180deg,#fff 0%,var(--bg) 100%); color:#8b7355; font-size:20px; font-weight:900; letter-spacing:.03em; }
    .recording-stack,.drill-stack,.results-stack { display:flex; flex-direction:column; gap:18px; align-items:center; }
    #scores { display:grid; width:100%; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    @media (min-width:680px) { #scores { grid-template-columns:repeat(4,minmax(0,1fr)); } }
    .score-card { min-height:92px; padding:14px; border:1.5px solid #f7cd67; border-radius:var(--r-base); background:radial-gradient(circle,rgba(247,205,103,.18) 1.5px,transparent 1.5px) 0 0/24px 24px,#fff3c8; text-align:center; }
    .score-label { color:var(--text-muted); font-size:12px; font-weight:800; letter-spacing:.06em; }
    .score-value { margin-top:4px; color:var(--text); font-size:30px; font-weight:900; line-height:1; font-variant-numeric:tabular-nums; }
    #highlighted { display:flex; flex-wrap:wrap; justify-content:center; gap:9px; width:100%; padding:18px; border:2px dashed #e8dcc8; border-radius:var(--r-lg); background:rgba(255,253,247,.72); line-height:1.4!important; font-size:1rem!important; }
    #highlighted span { display:inline-flex; align-items:center; min-height:31px; margin:0!important; padding:4px 12px!important; border:1.5px solid rgba(114,93,66,.10); border-radius:999px!important; color:var(--text-body); cursor:pointer; font-size:15px; font-weight:800; box-shadow:0 2px 6px rgba(61,52,40,.06); transition:transform var(--d-fast) var(--ease),box-shadow var(--d-fast) var(--ease); }
    #highlighted span:hover { transform:translateY(-1px); box-shadow:0 3px 10px rgba(61,52,40,.10); }
    .island-footer { width:min(960px,100%); height:82px; margin:18px auto 0; position:relative; overflow:hidden; color:transparent; }
    .island-footer::before { content:""; position:absolute; inset:auto -24px 0; height:58px; border-radius:100% 100% 0 0; background:radial-gradient(ellipse at 15% 100%,#82d5bb 0 28px,transparent 29px),radial-gradient(ellipse at 34% 100%,#8ac68a 0 34px,transparent 35px),radial-gradient(ellipse at 62% 100%,#f7cd67 0 26px,transparent 27px),radial-gradient(ellipse at 82% 100%,#82d5bb 0 32px,transparent 33px),linear-gradient(180deg,transparent 0%,rgba(111,186,44,.20) 100%); }
    @media (max-width:560px) { .island-page{padding:20px 12px 0;} .quest-board{padding:18px;} .section-head{flex-direction:column;align-items:center;text-align:center;} button{width:100%;} .action-row{width:100%;} #scores{grid-template-columns:1fr 1fr;} }
  </style>
</head>
<body>
  <main class="island-page">
    <div class="island-shell">
      <header class="island-header">
        <h1 class="ribbon-title">今日练习岛</h1>
        <p class="island-subtitle">完成今日朗读任务，找到问题词，再把它们一个个练顺。</p>
      </header>

      <section class="quest-board">
        <div class="section" id="setup">
          <div class="section-head">
            <div>
              <p class="section-kicker">Step 1</p>
              <h2 class="section-title">准备今日任务</h2>
            </div>
            <span class="task-pill">任务：全文朗读</span>
          </div>

          <div class="form-grid credentials">
            <div>
              <label for="region">Azure Region</label>
              <input id="region" type="text" placeholder="eastus" value="eastus">
            </div>
            <div>
              <label for="key">Azure Subscription Key</label>
              <input id="key" type="password" placeholder="输入你的 Azure Speech Key">
            </div>
          </div>

          <div class="form-grid" style="margin-top:16px">
            <div>
              <label for="sourceText">英文原文</label>
              <textarea id="sourceText" placeholder="在此粘贴英文原文..."></textarea>
            </div>
          </div>

          <div class="action-row">
            <button id="startBtn">开始朗读评估</button>
            <button id="demoBtn">用示例文本试试</button>
            <button id="mockBtn">用模拟数据看效果</button>
          </div>
        </div>

        <div class="section" id="recording" style="display:none">
          <div class="section-head">
            <div>
              <p class="section-kicker">Step 2</p>
              <h2 class="section-title">请朗读下方文本</h2>
            </div>
            <span class="task-pill">录音中</span>
          </div>

          <div class="recording-stack">
            <div class="task-card">
              <p id="recText"></p>
            </div>
            <p class="timer-card">录音时长：<span id="recTimer">0.0</span>s</p>
            <div class="action-row">
              <button id="stopBtn">停止录音</button>
              <button id="restartBtn">重新开始</button>
            </div>
          </div>
        </div>

        <div class="section" id="results" style="display:none">
          <div class="section-head">
            <div>
              <p class="section-kicker">Step 3</p>
              <h2 class="section-title">今日得分报告</h2>
            </div>
            <span class="task-pill">找到下一步</span>
          </div>

          <div class="results-stack">
            <div id="scores"></div>
            <div id="highlighted" style="line-height:2; font-size:1.1rem;"></div>
            <div class="action-row">
              <button id="drillSentenceBtn">练习问题句</button>
              <button id="drillWordBtn">练习问题词</button>
              <button id="retryFullBtn">重新读全文</button>
            </div>
          </div>
        </div>

        <div class="section" id="drill" style="display:none">
          <div class="section-head">
            <div>
              <p class="section-kicker">Step 4</p>
              <h2 class="section-title">针对性练习</h2>
            </div>
            <span class="task-pill">小任务循环</span>
          </div>

          <div class="drill-stack">
            <div class="task-card">
              <p id="drillTarget"></p>
            </div>
            <p id="drillStatus" class="task-pill"></p>
            <div class="action-row">
              <button id="playTtsBtn">听标准发音</button>
              <button id="drillRecordBtn">我读</button>
              <button id="nextDrillBtn">下一个</button>
              <button id="backBtn">返回结果</button>
            </div>
          </div>
        </div>
      </section>
    </div>
    <div class="island-footer">island footer</div>
  </main>
  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  <script>
    // ponytail: 单文件应用，所有逻辑放这里
    console.log('SpeechSDK:', typeof SpeechSDK);

    const $ = id => document.getElementById(id);
    let currentRecognizer = null;
    let collectedResults = [];
    let assessmentEpoch = 0;

    $('demoBtn').onclick = () => {
      $('sourceText').value = "I've always wanted to build a one-person business.";
    };
    $('mockBtn').onclick = () => {
      const text = $('sourceText').value.trim() || "I've always wanted to build a one-person business.";
      const sourceTokens = tokenize(text);
      const mid = Math.ceil(sourceTokens.length / 2);
      const makeWords = (tokens, offset, timeOffset) => tokens.map((t, i) => ({
        Word: t.raw,
        Offset: timeOffset + i * 10000000,
        Duration: 8000000,
        PronunciationAssessment: { AccuracyScore: (offset + i) === 3 ? 45 : ((offset + i) === 5 ? 70 : 88) }
      }));
      collectedResults = [
        {
          NBest: [{
            PronunciationAssessment: { ProsodyScore: 80 },
            Words: makeWords(sourceTokens.slice(0, mid), 0, 0)
          }]
        },
        {
          NBest: [{
            PronunciationAssessment: { ProsodyScore: 81 },
            Words: makeWords(sourceTokens.slice(mid), mid, mid * 10000000)
          }]
        }
      ];
      finishAssessment(text);
    };

    let recInterval;
    function showRecording(text) {
      $('setup').style.display = 'none';
      $('recording').style.display = 'block';
      $('recText').textContent = text;
      $('recTimer').textContent = '0.0';
      const start = Date.now();
      recInterval = setInterval(() => {
        $('recTimer').textContent = ((Date.now() - start) / 1000).toFixed(1);
      }, 100);
    }
    // ponytail: 用 Web Audio API 发声，无需额外音频文件
    function playBeep(frequency = 880, duration = 150) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = frequency;
      osc.type = 'sine';
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration / 1000);
      osc.stop(ctx.currentTime + duration / 1000);
    }
    function normalizeWord(w) {
      return w.toLowerCase()
        .replace(/[.,!?;:"'()\[\]]/g, '')
        .replace(/’/g, "'")
        .replace(/i'm/g, 'im')
        .replace(/i've/g, 'ive')
        .replace(/i'll/g, 'ill')
        .replace(/don't/g, 'dont')
        .replace(/can't/g, 'cant')
        .trim();
    }
    function tokenize(text) {
      return text.split(/\s+/).filter(Boolean).map((w, i) => ({ raw: w, norm: normalizeWord(w), index: i }));
    }
    function align(sourceTokens, recoWords) {
      const out = sourceTokens.map(t => ({ ...t, status: 'missing', score: 0, recognized: null }));
      let s = 0;
      for (const rw of recoWords) {
        const rn = normalizeWord(rw.Word || rw.word || '');
        if (!rn) continue;
        // 找到下一个匹配的原文词
        let matched = -1;
        for (let i = s; i < out.length; i++) {
          if (out[i].status === 'missing' && out[i].norm === rn) { matched = i; break; }
        }
        if (matched >= 0) {
          out[matched].status = 'ok';
          out[matched].score = (rw.PronunciationAssessment?.AccuracyScore) || 80;
          out[matched].recognized = rw.Word;
          s = matched + 1;
        } else {
          out.push({ raw: rw.Word, norm: rn, index: -1, status: 'extra', score: 0, recognized: rw.Word });
        }
      }
      return out;
    }
    function getRecoWords(result) {
      const nbest = result.NBest?.[0];
      return nbest?.Words || [];
    }
    function scoreToColor(score, status) {
      if (status === 'missing') return '#fbe0e0';
      if (status === 'extra') return '#fff3c8';
      if (score >= 80) return '#e9f6d4';
      if (score >= 60) return '#fff3c8';
      return '#fbe0e0';
    }
    function showError(msg) {
      alert(msg); // ponytail: 先用 alert，后续可换成页面内提示
    }
    function scoreDisplay(value) {
      return value === null || value === undefined || Number.isNaN(value) ? '暂无' : value;
    }
    function setDrillStatus(text, statusClass = '') {
      $('drillStatus').textContent = text;
      $('drillStatus').className = `task-pill ${statusClass}`.trim();
    }
    function renderResults(aligned, overall) {
      window.lastAligned = aligned;
      $('setup').style.display = 'none';
      $('recording').style.display = 'none';
      $('results').style.display = 'block';
      $('scores').innerHTML = `
        <div class="score-card"><div class="score-label">总体</div><div class="score-value">${overall.PronScore}</div></div>
        <div class="score-card"><div class="score-label">准确度</div><div class="score-value">${overall.AccuracyScore}</div></div>
        <div class="score-card"><div class="score-label">流畅度</div><div class="score-value">${overall.FluencyScore}</div></div>
        <div class="score-card"><div class="score-label">语调</div><div class="score-value">${scoreDisplay(overall.ProsodyScore)}</div></div>
      `;
      $('highlighted').innerHTML = aligned.map(t => {
        const bg = scoreToColor(t.score, t.status);
        const label = t.status === 'missing' ? '漏读' : (t.status === 'extra' ? '多读' : `得分 ${t.score}`);
        return `<span style="background:${bg}" title="${label}" data-idx="${t.index}">${t.raw}</span>`;
      }).join(' ');
    }
    function splitSentences(text) {
      // ponytail: 简单保护 U.S. 类缩写，不做完美 NLP；同时记录每句在全文中的词起始偏移
      const protectedText = text.replace(/(Mr|Mrs|Ms|Dr|U\.S|e\.g|i\.e)\.\s+/g, '$1##DOT## ');
      const rawSents = protectedText.split(/[.!?]+\s+/);
      let offset = 0;
      return rawSents.map(s => {
        const clean = s.replace(/##DOT##/g, '.').trim();
        const start = offset;
        const wordCount = clean.split(/\s+/).filter(Boolean).length;
        offset += wordCount;
        return { text: clean, start };
      }).filter(s => s.text);
    }
    let drillQueue = [];
    let drillIndex = 0;
    function buildDrillQueue(aligned, mode) {
      if (mode === 'word') {
        drillQueue = aligned.filter(t => t.status !== 'ok' || t.score < 80).map(t => t.raw);
      } else {
        const badIndices = new Set(aligned.filter(t => t.status !== 'ok' || t.score < 80).map(t => t.index));
        const sents = splitSentences($('sourceText').value);
        drillQueue = sents.filter(s => {
          const wordCount = s.text.split(/\s+/).filter(Boolean).length;
          for (let i = s.start; i < s.start + wordCount; i++) {
            if (badIndices.has(i)) return true;
          }
          return false;
        }).map(s => s.text);
      }
      drillIndex = 0;
    }
    async function runDrill() {
      if (drillQueue.length === 0) { alert('没有需要练习的内容'); return; }
      $('results').style.display = 'none';
      $('drill').style.display = 'block';
      const target = drillQueue[drillIndex];
      $('drillTarget').textContent = target;
      setDrillStatus(`第 ${drillIndex + 1}/${drillQueue.length} 个，点击“我读”开始录音`);
    }

    function startContinuousAssessment(text, key, region, callbacks) {
      const epoch = ++assessmentEpoch;
      const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(key, region);
      speechConfig.speechRecognitionLanguage = 'en-US';
      speechConfig.outputFormat = SpeechSDK.OutputFormat.Detailed;
      // ponytail: 连续模式下 EnableMiscue 不生效，我们自己做对齐
      const pronunciationConfig = new SpeechSDK.PronunciationAssessmentConfig(
        text,
        SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
        SpeechSDK.PronunciationAssessmentGranularity.Phoneme,
        false
      );
      const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
      const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
      pronunciationConfig.enableProsodyAssessment = true;
      pronunciationConfig.applyTo(recognizer);

      recognizer.recognized = (_, e) => {
        if (epoch !== assessmentEpoch) return;
        if (e.result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
          const json = e.result.properties.getProperty(SpeechSDK.PropertyId.SpeechServiceResponse_JsonResult);
          callbacks.onResult(JSON.parse(json));
        }
      };
      recognizer.canceled = (_, e) => {
        if (epoch !== assessmentEpoch) return;
        callbacks.onError(e.errorDetails || e.reason);
      };
      recognizer.sessionStopped = () => {
        if (epoch !== assessmentEpoch) return;
        callbacks.onStopped();
      };

      recognizer.startContinuousRecognitionAsync();
      return recognizer;
    }

    // Drill 练习由用户手动开始/结束，停止后立即汇总评分。
    let drillRecognizer = null;
    let drillResults = [];
    let drillTimer = null;
    let drillStartedAt = 0;
    let drillTargetText = '';

    function setDrillButton(state) {
      $('drillRecordBtn').className = '';
      $('drillRecordBtn').disabled = false;
      if (state === 'recording') {
        $('drillRecordBtn').textContent = '结束并评分';
        $('drillRecordBtn').classList.add('is-recording');
      } else if (state === 'scoring') {
        $('drillRecordBtn').textContent = '评分中...';
        $('drillRecordBtn').classList.add('is-scoring');
        $('drillRecordBtn').disabled = true;
      } else {
        $('drillRecordBtn').textContent = '我读';
      }
    }

    function startDrillTimer() {
      clearInterval(drillTimer);
      drillStartedAt = Date.now();
      drillTimer = setInterval(() => {
        const seconds = ((Date.now() - drillStartedAt) / 1000).toFixed(1);
        setDrillStatus(`正在录音 ${seconds}s，再点一次“结束并评分”`, 'status-listening');
      }, 100);
    }

    function stopDrillTimer() {
      clearInterval(drillTimer);
      drillTimer = null;
    }

    function startDrillAssessment(text, key, region) {
      const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(key, region);
      speechConfig.speechRecognitionLanguage = 'en-US';
      speechConfig.outputFormat = SpeechSDK.OutputFormat.Detailed;
      const pronunciationConfig = new SpeechSDK.PronunciationAssessmentConfig(
        text,
        SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
        SpeechSDK.PronunciationAssessmentGranularity.Phoneme,
        false
      );
      const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
      const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
      pronunciationConfig.enableProsodyAssessment = true;
      pronunciationConfig.applyTo(recognizer);

      recognizer.speechStartDetected = () => setDrillStatus('听到了，请继续读完；读完后点“结束并评分”', 'status-listening');
      recognizer.speechEndDetected = () => setDrillStatus('检测到停顿，可以点“结束并评分”', 'status-listening');
      recognizer.recognized = (_, e) => {
        if (e.result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
          const json = e.result.properties.getProperty(SpeechSDK.PropertyId.SpeechServiceResponse_JsonResult);
          drillResults.push(JSON.parse(json));
        }
      };
      recognizer.canceled = (_, e) => finishDrillAssessment(e.errorDetails || e.reason);
      recognizer.sessionStopped = () => finishDrillAssessment();
      recognizer.startContinuousRecognitionAsync(
        () => {
          playBeep(1040, 180);
          playBeep(1320, 100);
          drillRecognizer = recognizer;
          drillTargetText = text;
          drillResults = [];
          setDrillButton('recording');
          startDrillTimer();
          setDrillStatus('录音已开始，再点一次“结束并评分”', 'status-listening');
        },
        err => {
          recognizer.close();
          finishDrillAssessment(err);
        }
      );
    }

    function requestStopDrillAssessment() {
      if (!drillRecognizer) return;
      stopDrillTimer();
      setDrillButton('scoring');
      setDrillStatus('录音结束，正在评分...', 'status-scoring');
      playBeep(520, 220);
      const recognizer = drillRecognizer;
      drillRecognizer = null;
      recognizer.stopContinuousRecognitionAsync(
        () => recognizer.close(),
        err => finishDrillAssessment(err)
      );
    }

    function finishDrillAssessment(error) {
      stopDrillTimer();
      setDrillButton('idle');
      if (error) {
        if (drillRecognizer) { drillRecognizer.close(); drillRecognizer = null; }
        setDrillStatus('评估失败：' + error, 'status-error');
        return;
      }
      if (drillResults.length === 0) {
        setDrillStatus('没有检测到可评分的朗读，请再试一次', 'status-retry');
        return;
      }
      const overall = computeOverallScores(drillResults, tokenize(drillTargetText));
      if (overall.PronScore === undefined || Number.isNaN(overall.PronScore)) {
        setDrillStatus('没有拿到评分，请再读一次', 'status-retry');
        return;
      }
      setDrillStatus(`得分 ${overall.PronScore}；${overall.PronScore >= 80 ? '通过' : '再试一次'}`, overall.PronScore >= 80 ? 'status-pass' : 'status-retry');
    }

    function beginAssessment() {
      if (currentRecognizer) return; // 防止重复开始
      const region = $('region').value.trim();
      const key = $('key').value.trim();
      const text = $('sourceText').value.trim();
      if (!region || !key || !text) { alert('请填写完整'); return; }

      collectedResults = [];
      showRecording(text);
      playBeep(880, 150); // 录音开始提示音

      currentRecognizer = startContinuousAssessment(text, key, region, {
        onResult: r => collectedResults.push(r),
        onError: msg => {
          clearInterval(recInterval);
          currentRecognizer = null;
          handleSpeechError(msg);
        },
        onStopped: () => finishAssessment(text)
      });
    }

    function computeOverallScores(results, sourceTokens) {
      const allWords = results.flatMap(r => getRecoWords(r));
      const aligned = align(sourceTokens, allWords);

      // ponytail: 按 Azure 官方 JS 示例重新计算总体分数，不直接取每 utterance 的平均
      const nonExtra = aligned.filter(t => t.status !== 'extra');
      const accuracyScore = nonExtra.length > 0
        ? Math.round(nonExtra.reduce((sum, t) => sum + (t.score || 0), 0) / nonExtra.length)
        : 0;

      let fluencyScore = 0;
      if (allWords.length > 0) {
        const startOffset = allWords[0].Offset;
        const lastWord = allWords[allWords.length - 1];
        const endOffset = lastWord.Offset + lastWord.Duration;
        const totalDuration = allWords.reduce((sum, w) => sum + (w.Duration || 0) + 100000, 0);
        if (endOffset > startOffset) {
          fluencyScore = Math.min(100, Math.round((totalDuration / (endOffset - startOffset)) * 100));
        }
      }

      const prosodyScores = results
        .map(r => r.NBest?.[0]?.PronunciationAssessment?.ProsodyScore)
        .filter(v => v !== undefined && !Number.isNaN(v));
      const prosodyScore = prosodyScores.length > 0
        ? Math.round(prosodyScores.reduce((a, b) => a + b, 0) / prosodyScores.length)
        : null;

      const validWordCount = aligned.filter(t => t.status === 'ok').length;
      const completenessScore = sourceTokens.length > 0
        ? Math.round((validWordCount / sourceTokens.length) * 100)
        : 0;

      let pronScore;
      if (prosodyScore !== null && prosodyScore > 0) {
        const sorted = [accuracyScore, prosodyScore, completenessScore, fluencyScore].sort((a, b) => a - b);
        pronScore = Math.round(sorted[0] * 0.4 + sorted[1] * 0.2 + sorted[2] * 0.2 + sorted[3] * 0.2);
      } else {
        const sorted = [accuracyScore, completenessScore, fluencyScore].sort((a, b) => a - b);
        pronScore = Math.round(sorted[0] * 0.6 + sorted[1] * 0.2 + sorted[2] * 0.2);
      }

      return { PronScore: pronScore, AccuracyScore: accuracyScore, FluencyScore: fluencyScore, ProsodyScore: prosodyScore, CompletenessScore: completenessScore };
    }

    function finishAssessment(text) {
      currentRecognizer = null;
      clearInterval(recInterval);
      if (collectedResults.length === 0) {
        showError('未检测到语音，请靠近麦克风再试一次');
        return;
      }
      const words = collectedResults.flatMap(r => getRecoWords(r));
      const sourceTokens = tokenize(text);
      const overall = computeOverallScores(collectedResults, sourceTokens);
      const aligned = align(sourceTokens, words);
      console.table(aligned);
      renderResults(aligned, overall);
    }

    function handleSpeechError(msg) {
      msg = String(msg || '');
      if (msg.includes('401') || msg.includes('403')) showError('Azure Key 或 Region 无效，请检查 Azure 门户');
      else if (msg.includes('network') || msg.includes('ECONNREFUSED')) showError('连接 Azure 失败，请检查网络');
      else if (msg.includes('NotAllowed')) showError('麦克风权限被拒绝，请在浏览器设置中允许');
      else if (msg.includes('识别失败')) showError('未检测到语音，请靠近麦克风再试一次');
      else showError('出错了：' + msg);
    }

    $('startBtn').onclick = beginAssessment;
    $('stopBtn').onclick = () => {
      playBeep(440, 200); // 录音完成提示音
      if (currentRecognizer) currentRecognizer.stopContinuousRecognitionAsync();
    };
    $('restartBtn').onclick = () => {
      if (currentRecognizer) {
        const old = currentRecognizer;
        currentRecognizer = null;
        old.stopContinuousRecognitionAsync();
      }
      clearInterval(recInterval);
      beginAssessment();
    };
    $('drillSentenceBtn').onclick = () => { buildDrillQueue(window.lastAligned, 'sentence'); runDrill(); };
    $('drillWordBtn').onclick = () => { buildDrillQueue(window.lastAligned, 'word'); runDrill(); };
    $('drillRecordBtn').onclick = () => {
      if (drillRecognizer) { requestStopDrillAssessment(); return; }
      const target = drillQueue[drillIndex];
      const region = $('region').value.trim();
      const key = $('key').value.trim();
      if (!target) { setDrillStatus('没有可练习的内容', 'status-error'); return; }
      if (!region || !key) { setDrillStatus('请先填写 Azure Region 和 Key', 'status-error'); return; }
      setDrillButton('scoring');
      setDrillStatus('正在启动麦克风...', 'status-scoring');
      startDrillAssessment(target, key, region);
    };
    $('playTtsBtn').onclick = () => {
      const target = drillQueue[drillIndex];
      const u = new SpeechSynthesisUtterance(target);
      u.lang = 'en-US';
      u.rate = 0.9;
      speechSynthesis.speak(u);
    };
    $('nextDrillBtn').onclick = () => { if (drillRecognizer) requestStopDrillAssessment(); drillIndex++; if (drillIndex >= drillQueue.length) drillIndex = 0; runDrill(); };
    $('backBtn').onclick = () => { if (drillRecognizer) requestStopDrillAssessment(); $('drill').style.display = 'none'; $('results').style.display = 'block'; };
  </script>
</body>
</html>
